<body>
    <div id="hearts-container"></div>
    <div class="glass-card">
        <h2 style="font-size: 2rem;">Mera Pyaara Sa Sach...</h2>
        <p id="typewriter" style="font-style: italic; margin-top: 20px; font-size: 1.1rem; min-height: 200px;"></p>

    <script src="music.js"></script>
    <script>
        const text = "Pata hai, log kehte hain 2-3 mahine bahut kam hote hain kisi ko janne ke liye... par mere liye ye 2-3 mahine meri zindagi ke sabse khoobsurat din rahe hain. Tumse baat karna, tumhari fikr karna, aur har waqt bas tumhare baare mein sochna—ye ab meri aadat ban chuki hai. I may not be the best, but I promise I will be yours forever. ❤️";
        let i = 0;
        function type() {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(i);
                i++; setTimeout(type, 50);
            }
        }
        type();
    </script>
</body>
