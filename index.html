<html lang="en">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="hearts-container"></div>
    
    <div class="glass-card">
        <div style="font-size: 3rem; margin-bottom: 10px;">✨</div>
        <h1>Hey My Life,</h1>
        <p style="margin-top: 15px;">Sirf 2-3 mahine hue hain, par aisa lagta hai jaise sadiyon se tumhe jaanta hoon. Tum sirf meri girlfriend nahi, mera sukoon ho.</p>
        <p style="font-size: 0.9rem; margin-top: 10px; opacity: 0.8;">(Screen par kahin bhi touch karo music ke liye 🎵)</p>
        <a href="love.html" class="btn">Enter My Heart ❤️</a>

    <nav>

    <script src="music.js"></script>
    <script>
        function createHeart() {
            const h = document.createElement('div');
            h.classList.add('heart'); h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.animationDuration = Math.random() * 2 + 3 + 's';
            document.getElementById('hearts-container').appendChild(h);
            setTimeout(() => h.remove(), 5000);
        }
        setInterval(createHeart, 400);
    </script>
</body>
