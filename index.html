<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madam Aapke liye❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Background -->
    <div class="gradient-bg"></div>
    <div id="hearts-container"></div>

    <!-- Background Music -->
    <audio id="bg-music" loop>
        <source src="Jaanu.m4a" type="audio/mp4">
    </audio>

    <!-- Main Content -->
    <main id="main-content">
        <div class="glass-card animate-in">
            <div class="profile-pic">
                <img src="https://i.ibb.co/SwW9HDc7/IMG-20260303-202411-125.jpg" alt="Love">
            </div>
            <h1 class="special-font">Hey Jaanuu... ❤️</h1>
            <p>January mein dosti hui thi, par 1 March ke baad se tumhare aur mere beech kuch chalne laga tha. Tab se har pal sirf tumhara hai.</p>
            <button class="btn" onclick="loadPage('love')">Hamari Kahani Dekho</button>
        </div>
    </main>

    <!-- Navigation -->
    <nav>
        <a href="javascript:void(0)" onclick="loadPage('home')">🏠</a>
        <a href="javascript:void(0)" onclick="loadPage('love')">💌</a>
        <a href="javascript:void(0)" onclick="loadPage('memories')">📸</a>
        <a href="javascript:void(0)" onclick="loadPage('fun')">✨</a>
        <a href="javascript:void(0)" onclick="loadPage('special')">⌛</a>
    </nav>

    <!-- Custom Popup -->
    <div id="popup">
        <div id="popup-icon">💖</div>
        <p id="popup-text"></p>
        <button class="btn-small" onclick="closePopup()">Pyaar Tumse ❤️</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
